<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshay John | UX/UI & Visual Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          colors: {
            'accent': '#4F46E5', // Indigo 600
            'dark': '#0a0a0a',
            'light': '#fafafa',
          },
          animation: {
            'blob': 'blob 7s infinite',
            'tag-enter': 'tagEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
            'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            'shimmer': 'shimmer 2s infinite linear',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            tagEnter: {
              '0%': { opacity: '0', transform: 'scale(0.8)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' }
            }
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
      /* Offsets scroll for sticky navbar */
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4F46E5;
    }

    @keyframes nudge {
      0%, 100% { transform: translateX(0); }
      30% { transform: translateX(-30px); }
      60% { transform: translateX(0); }
    }
    .nudge-horizontal {
      animation: nudge 2s ease-in-out;
    }
  </style>
  <script type="module" crossorigin src="/Portfolio_Creative_Technologist-/assets/index-CJecgbc0.js"></script>
</head>

<body class="bg-light text-dark dark:bg-dark dark:text-light transition-colors duration-300">
  <div id="root"></div>
</body>

</html>
